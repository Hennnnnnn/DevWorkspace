name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Build
        run: go build ./cmd/devsync && go build ./cmd/devsync-server

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build Windows binaries
        run: |
          go build -ldflags "-X github.com/Hennnnnnn/DevWorkspace/internal/client/config.DefaultServerURL=https://devworkspace.onrender.com" -o devsync.exe ./cmd/devsync
          go build -ldflags "-X github.com/Hennnnnnn/DevWorkspace/internal/client/config.DefaultServerURL=https://devworkspace.onrender.com" -o devsync-server.exe ./cmd/devsync-server

      - uses: actions/upload-artifact@v4
        with:
          name: devsync-windows-amd64
          path: |
            devsync.exe
            devsync-server.exe
